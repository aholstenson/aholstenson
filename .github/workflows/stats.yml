on:
  schedule:
    - cron: '0 */12 * * *' # every 12 hours
  push:
    branches:
      - main
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Generate README.md
      env:
        GH_TOKEN: ${{ secrets.USER_TOKEN }}
      run: |
        set -euo pipefail

        USER=$(gh api user --jq .login)

        # Lifetime commits: contributionsCollection is capped at one year,
        # so sum every year from account creation to now.
        CREATED=$(gh api graphql -f query='
          query($u:String!){ user(login:$u){ createdAt } }
        ' -F u="$USER" --jq '.data.user.createdAt')
        START_YEAR=${CREATED:0:4}
        END_YEAR=$(date -u +%Y)

        COMMITS=0
        for ((y=START_YEAR; y<=END_YEAR; y++)); do
          C=$(gh api graphql -f query='
            query($u:String!,$from:DateTime!,$to:DateTime!){
              user(login:$u){
                contributionsCollection(from:$from,to:$to){
                  totalCommitContributions
                  restrictedContributionsCount
                }
              }
            }
          ' -F u="$USER" -F from="${y}-01-01T00:00:00Z" -F to="${y}-12-31T23:59:59Z" \
            --jq '.data.user.contributionsCollection
                  | (.totalCommitContributions + .restrictedContributionsCount)')
          COMMITS=$((COMMITS + C))
        done

        ISSUES=$(gh api graphql -f query='
          query($u:String!){ user(login:$u){ issues { totalCount } } }
        ' -F u="$USER" --jq '.data.user.issues.totalCount')

        PULL_REQUESTS=$(gh api graphql -f query='
          query($u:String!){ user(login:$u){ pullRequests { totalCount } } }
        ' -F u="$USER" --jq '.data.user.pullRequests.totalCount')

        # Public repos committed to in the last quarter (~90 days), incl. ones
        # not owned by the user. Well within the contributions 1-year cap.
        FROM=$(date -u -d '-90 days' +%Y-%m-%dT%H:%M:%SZ)
        TO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        LINKS=$(gh api graphql -f query='
          query($u:String!,$from:DateTime!,$to:DateTime!){
            user(login:$u){
              contributionsCollection(from:$from,to:$to){
                commitContributionsByRepository(maxRepositories:100){
                  contributions(first:1, orderBy:{field:OCCURRED_AT, direction:DESC}){
                    nodes { occurredAt }
                  }
                  repository { nameWithOwner url isPrivate isFork }
                }
              }
            }
          }
        ' -F u="$USER" -F from="$FROM" -F to="$TO" \
          --jq '[ .data.user.contributionsCollection.commitContributionsByRepository[]
                  | select(.repository.isPrivate == false and .repository.isFork == false)
                  | { n: .repository.nameWithOwner, url: .repository.url,
                      t: .contributions.nodes[0].occurredAt } ]
                | sort_by(.t) | reverse | .[0:5] | .[]
                | "[\(.n | ltrimstr("'"$USER"'/"))](\(.url))"')

        # Join the links into an Oxford-style list (the surrounding sentence
        # lives in TEMPLATE.md). Empty when there was no recent activity.
        RECENT_REPOS=""
        if [ -n "$LINKS" ]; then
          mapfile -t ARR <<< "$LINKS"
          N=${#ARR[@]}
          if [ "$N" -eq 1 ]; then
            RECENT_REPOS="${ARR[0]}"
          else
            RECENT_REPOS=$(printf '%s, ' "${ARR[@]:0:N-1}")
            RECENT_REPOS="${RECENT_REPOS%, } and ${ARR[N-1]}"
          fi
        fi

        # Repository count + total stars, paginated over owned non-fork public repos.
        REPOSITORIES=0
        STARS=0
        CURSOR=null
        while :; do
          PAGE=$(gh api graphql -f query='
            query($u:String!,$cursor:String){
              user(login:$u){
                repositories(ownerAffiliations:OWNER, isFork:false, privacy:PUBLIC,
                             first:100, after:$cursor){
                  totalCount
                  pageInfo { hasNextPage endCursor }
                  nodes { stargazerCount }
                }
              }
            }
          ' -F u="$USER" -F cursor="$CURSOR" --jq '.data.user.repositories')
          REPOSITORIES=$(echo "$PAGE" | jq '.totalCount')
          PAGE_STARS=$(echo "$PAGE" | jq '[.nodes[].stargazerCount] | add // 0')
          STARS=$((STARS + PAGE_STARS))
          [ "$(echo "$PAGE" | jq -r '.pageInfo.hasNextPage')" = "true" ] || break
          CURSOR=$(echo "$PAGE" | jq -r '.pageInfo.endCursor')
        done

        echo "commits=$COMMITS issues=$ISSUES prs=$PULL_REQUESTS repos=$REPOSITORIES stars=$STARS"

        cp TEMPLATE.md README.md
        sed -i \
          -e "s/{{ COMMITS }}/$COMMITS/g" \
          -e "s/{{ ISSUES }}/$ISSUES/g" \
          -e "s/{{ PULL_REQUESTS }}/$PULL_REQUESTS/g" \
          -e "s/{{ REPOSITORIES }}/$REPOSITORIES/g" \
          -e "s/{{ STARS }}/$STARS/g" \
          README.md

        # Substitute the {{ RECENT_REPOS }} token with the link list (literal
        # replacement, so slashes/brackets in URLs are safe), or drop the whole
        # sentence and its trailing blank line when there was no activity.
        TOKEN="{{ RECENT_REPOS }}"
        if [ -n "$RECENT_REPOS" ]; then
          awk -v r="$RECENT_REPOS" -v t="$TOKEN" '
            { i=index($0,t)
              if(i) $0=substr($0,1,i-1) r substr($0,i+length(t))
              print }' README.md > README.tmp
        else
          awk -v t="$TOKEN" '
            index($0,t){ getline; next }
            { print }' README.md > README.tmp
        fi
        mv README.tmp README.md
    - name: Update README.md
      run: |
        if [[ "$(git status --porcelain)" != "" ]]; then
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add .
        git commit -m "docs: Update README via automation"
        git push
        fi
